name: Setup Flutter
description: Configura Flutter SDK con cache de pub

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.22.x"
        channel: stable
        cache: true
        cache-key: flutter-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
