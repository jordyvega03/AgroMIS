name: CD Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: backend, context: backend/, dockerfile: backend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-build-push
        with:
          service: ${{ matrix.service.name }}
          context: ${{ matrix.service.context }}
          dockerfile: ${{ matrix.service.dockerfile }}
          aws-region: us-east-1
          ecr-repository: agromis/${{ matrix.service.name }}
          image-tag: ${{ github.sha }}
          aws-role-arn: ${{ secrets.AWS_STAGING_DEPLOY_ROLE }}

  update-image-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Actualizar tag en values de staging
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" \
            infra/k8s/apps/backend/values-staging.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/apps/
          git commit -m "chore: bump staging image tags to ${{ github.sha }}" || echo "Sin cambios"
          git push
