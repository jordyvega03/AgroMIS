name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Detectar que cambio ----------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend:    ${{ steps.filter.outputs.backend }}
      projection: ${{ steps.filter.outputs.projection }}
      mobile:     ${{ steps.filter.outputs.mobile }}
      web:        ${{ steps.filter.outputs.web }}
      infra:      ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            projection:
              - 'projection-engine/**'
            mobile:
              - 'mobile/**'
            web:
              - 'web/**'
            infra:
              - 'infra/**'

  # ---- Backend (Java / Quarkus) -----------------------------------
  backend-lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java
      - name: Lint y tests
        run: ./gradlew :backend:check --no-daemon
      - name: JaCoCo coverage report
        run: ./gradlew :backend:jacocoTestReport --no-daemon
      - name: Enforce coverage minimo (70%)
        run: ./gradlew :backend:jacocoTestCoverageVerification --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/build/reports/

  # ---- Python / projection-engine ---------------------------------
  python-lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.projection == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -r projection-engine/requirements.txt -r projection-engine/requirements-dev.txt
      - name: Lint con ruff
        run: ruff check projection-engine/
      - name: Tests con cobertura (60% minimo)
        run: pytest projection-engine/ --cov=projection_engine --cov-fail-under=60 -v

  # ---- Mobile (Flutter) ------------------------------------------
  mobile-lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - name: flutter pub get
        run: flutter pub get
        working-directory: mobile/
      - name: flutter analyze
        run: flutter analyze
        working-directory: mobile/
      - name: flutter test (cobertura 60% minimo)
        run: flutter test --coverage
        working-directory: mobile/

  # ---- Web (React / Next.js) --------------------------------------
  web-lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
        working-directory: web/
      - name: Lint
        run: pnpm lint
        working-directory: web/
      - name: Tests
        run: pnpm test:ci
        working-directory: web/

  # ---- Infra (Terraform + Helm) -----------------------------------
  infra-validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/terraform/
      - name: Terraform validate (staging)
        run: |
          cd infra/terraform/environments/staging
          terraform init -backend=false
          terraform validate
      - uses: azure/setup-helm@v4
        with:
          version: "3.14"
      - name: Helm lint
        run: helm lint infra/k8s/charts/agromis-service/

  # ---- Security scan (todos los PRs) ------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
