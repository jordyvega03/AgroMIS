version: "3.9"

# ---------------------------------------------------------------
# AgroMIS — Stack de desarrollo local completo
# Levantar: ./scripts/dev-up.sh
# Apagar:   ./scripts/dev-down.sh
# ---------------------------------------------------------------

networks:
  agromis-net:
    driver: bridge

volumes:
  postgres_data:
  redpanda_data:
  redis_data:
  keycloak_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

services:

  # ---- PostgreSQL + PostGIS + TimescaleDB ----------------------
  postgres:
    image: timescale/timescaledb-ha:pg16-all
    container_name: agromis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agromis
      POSTGRES_PASSWORD: agromis_dev_pass
      POSTGRES_DB: agromis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - agromis-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agromis -d agromis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redpanda (Kafka-compatible) -----------------------------
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: agromis-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "19092:19092"   # Kafka API externo
      - "18082:18082"   # Pandaproxy externo
      - "18081:18081"   # Schema Registry externo
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - agromis-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---- Redpanda Console -----------------------------------------
  redpanda-console:
    image: redpandadata/console:latest
    container_name: agromis-redpanda-console
    restart: unless-stopped
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - agromis-net

  # ---- Redis ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agromis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agromis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Keycloak ------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: agromis-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: agromis
      KC_DB_PASSWORD: agromis_dev_pass
      KC_HTTP_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "8081:8081"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agromis-net

  # ---- MinIO (S3-compatible) -----------------------------------
  minio:
    image: minio/minio:latest
    container_name: agromis-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: agromis
      MINIO_ROOT_PASSWORD: agromis_minio_pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks:
      - agromis-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Prometheus ----------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: agromis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - agromis-net

  # ---- Loki ---------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: agromis-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - agromis-net

  # ---- Tempo ---------------------------------------------------
  tempo:
    image: grafana/tempo:latest
    container_name: agromis-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
    volumes:
      - tempo_data:/var/tempo
    networks:
      - agromis-net

  # ---- Grafana -------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: agromis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - agromis-net
