controller:
  replicaCount: 2
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
  config:
    use-real-ip: "true"
    proxy-body-size: "50m"
    ssl-redirect: "true"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
