mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector
            static_configs:
              - targets: ["0.0.0.0:8888"]

  processors:
    batch:
      timeout: 1s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
      spike_limit_mib: 100
    resource:
      attributes:
        - action: upsert
          key: service.namespace
          value: agromis

  exporters:
    otlp/tempo:
      endpoint: http://tempo.monitoring:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.monitoring:3100/loki/api/v1/push
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: agromis

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [loki]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheus]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 30s
