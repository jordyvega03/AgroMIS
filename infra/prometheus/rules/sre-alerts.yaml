apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agromis-sre-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: agromis.golden_signals
      interval: 30s
      rules:
        # Alta tasa de errores HTTP 5xx
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5..",namespace=~"agromis.*"}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{namespace=~"agromis.*"}[5m]))
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Tasa de errores > 5% en {{ $labels.service }}"
            description: "El servicio {{ $labels.service }} tiene {{ $value | humanizePercentage }} de errores."

        # Latencia alta (p95 > 1s)
        - alert: HighLatencyP95
          expr: |
            histogram_quantile(0.95,
              rate(http_server_requests_seconds_bucket{namespace=~"agromis.*"}[5m])
            ) > 1.0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Latencia p95 > 1s en {{ $labels.service }}"

        # Pod reiniciando frecuentemente
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace=~"agromis.*"}[15m]) * 60 > 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} esta crash-looping"

        # Uso alto de memoria (> 90% del limit)
        - alert: HighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace=~"agromis.*",container!=""}
              / container_spec_memory_limit_bytes{namespace=~"agromis.*",container!=""}
            ) > 0.90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Uso de memoria > 90% en {{ $labels.container }}"

    - name: agromis.database
      rules:
        # Muchas conexiones activas en Postgres
        - alert: PostgresConnectionsHigh
          expr: pg_stat_activity_count > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Postgres tiene {{ $value }} conexiones activas"

        # Replica lag alto
        - alert: PostgresReplicationLagHigh
          expr: pg_replication_lag > 30
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Lag de replicacion PostgreSQL: {{ $value }}s"
